<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Cadastro | Agenda Alegre</title>

    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/auth.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <header>

        <div class="header-container">

            <div class="logo">

                <a href="landingpage.html">
                    <img src="../assets/img/logo.png" alt="Logo Agenda Alegre">
                </a>

                <h1>Agenda Alegre</h1>

            </div>

            <nav>

                <a href="login.html">Entrar</a>

                <a href="cadastro.html" class="cadastro-btn">
                    Cadastre-se
                </a>

            </nav>

        </div>

    </header>

    <main class="auth-container">

        <section class="auth-box">

            <h1>Cadastro</h1>

            <p>Crie sua conta</p>

            <form id="formCadastro">

                <label for="nome">Nome Completo</label>

                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome completo"
                    required>

                <label for="telefone">Telefone</label>

                <input
                    type="tel"
                    id="telefone"
                    placeholder="(28) 99999-9999"
                    required>

                <label for="email">Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu email"
                    required>

                <label for="senha">Senha</label>

                    <div class="campo-senha">

                        <input
                            type="password"
                            id="senha"
                            placeholder="Digite sua senha">

                        <button
                            type="button"
                            class="toggle-senha"
                            aria-label="Mostrar senha">

                            <i data-lucide="eye"></i>

                        </button>

                    </div>

                <label for="tipoPessoa">Tipo de Pessoa</label>
                <select id="tipoPessoa" required>
                    <option value="FISICA" selected>Pessoa Física</option>
                    <option value="JURIDICA">Pessoa Jurídica</option>
                </select>git 

                <label for="documento">CPF / CNPJ</label>

                <input
                    type="text"
                    id="documento"
                    placeholder="Digite seu CPF ou CNPJ"
                    required>

                <button type="submit">
                    Criar Conta
                </button>

            </form>

            <div class="link">

                <span>Já possui uma conta? </span>

                <a href="login.html">
                    Entrar
                </a>

            </div>

        </section>

    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/cadastro.js"></script>
    <script src="../assets/js/mostrarSenha.js"></script>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
